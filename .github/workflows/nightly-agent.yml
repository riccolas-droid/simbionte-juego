name: Nightly Simbionte Agent

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  nightly:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Build agent brief
        run: npm run agent:brief

      - name: Run and save AI response
        run: |
          echo "=== EJECUTANDO SIMBIONTE ==="
          PROMPT=$(cat agent/COMPILED_AGENT_PROMPT.md | jq -Rs .)

          curl https://api.openai.com/v1/responses \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"gpt-4.1-mini\",
              \"input\": $PROMPT
            }" > agent/last_response.json

          cat agent/last_response.json

      - name: Extract AI text
        run: |
          cat agent/last_response.json | jq -r '.output[0].content[0].text' > agent/last_text.txt
          cat agent/last_text.txt

      - name: Apply AI HUD line safe mode
        run: |
          TEXT=$(cat agent/last_text.txt | jq -r '.')

          echo "Texto generado: $TEXT"

          if [[ -z "$TEXT" || "$TEXT" == "null" ]]; then
            echo "Texto vacío. Abortando."
            exit 1
          fi

          if echo "$TEXT" | grep -q "ctx\|canvas\|function\|export\|import\|=>\|;"; then
            echo "Texto contiene código prohibido. Abortando."
            exit 1
          fi

          if ! grep -q "const aiHudLines = \[" hud.js; then
            echo "No existe aiHudLines en hud.js. Abortando."
            exit 1
          fi

          awk -v newline="$TEXT" '
            /const aiHudLines = \[/ {
              print
              print "  `" newline "`,"
              next
            }
            { print }
          ' hud.js > hud.tmp && mv hud.tmp hud.js

      - name: Test
        run: npm test

      - name: Run agent cycle in Supabase
        run: node scripts/run-agent-cycle.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Commit agent response
        run: |
          git config --global user.name "simbionte-bot"
          git config --global user.email "bot@simbionte.ai"

          git add agent/last_response.json agent/last_text.txt agent/COMPILED_AGENT_PROMPT.md hud.js index.html

          git commit -m "🤖 Nightly: apply agent HUD line $(date)" || echo "No changes to commit"
          git push
