name: Nightly Simbionte Agent

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  nightly:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Build agent brief
        run: npm run agent:brief

      - name: Run AI agent
        run: |
          echo "=== EJECUTANDO SIMBIONTE ==="

          PROMPT=$(cat agent/COMPILED_AGENT_PROMPT.md | jq -Rs .)

          curl https://api.openai.com/v1/responses \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"gpt-4.1-mini\",
              \"input\": $PROMPT
            }"

      - name: Test
        run: npm test

      - name: Save AI response
        run: |
          curl https://api.openai.com/v1/responses \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"gpt-4.1-mini\",
              \"input\": $(cat agent/COMPILED_AGENT_PROMPT.md | jq -Rs .)
            }" > agent/last_response.json
