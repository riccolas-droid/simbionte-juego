name: Nightly Simbionte Agent

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  nightly:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Build agent brief
        run: npm run agent:brief

      - name: Run and save AI response
        run: |
          echo "=== EJECUTANDO SIMBIONTE ==="
          PROMPT=$(cat agent/COMPILED_AGENT_PROMPT.md | jq -Rs .)

          curl https://api.openai.com/v1/responses \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"gpt-4.1-mini\",
              \"input\": $PROMPT
            }" > agent/last_response.json

          cat agent/last_response.json


      - name: Extract AI text
        run: |
          cat agent/last_response.json | jq -r '.output[0].content[0].text' > agent/last_text.txt
          cat agent/last_text.txt
          
      - name: Test
        run: npm test

      - name: Commit agent response
        run: |
          git config --global user.name "simbionte-bot"
          git config --global user.email "bot@simbionte.ai"

          git add agent/last_response.json agent/last_text.txt agent/COMPILED_AGENT_PROMPT.md

          git commit -m "🤖 Nightly: save agent response $(date)" || echo "No changes to commit"
          git push
